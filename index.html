<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Hanacaraka Numeric System</title>

  <!-- CoreUI CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.2/dist/css/coreui.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f3f4f7;
      min-height: 100vh;
      padding: 40px 0;
    }

    .card {
      border: none;
      border-radius: 16px;
    }

    .result-box {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 5px solid #5856d6;
    }

    .token {
      display: inline-block;
      background: #eef1ff;
      color: #3c4b64;
      padding: 4px 10px;
      border-radius: 999px;
      margin: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-10">

      <div class="card shadow">
        <div class="card-body p-4">

          <h1 class="mb-2">Hanacaraka Numeric System</h1>

          <p class="text-medium-emphasis mb-4">
            Sistem fonetik numerik berbasis hanacaraka. Karena manusia tidak cukup puas dengan alfabet biasa.
          </p>

          <div class="mb-3">
            <label class="form-label">Input Nama</label>

            <input
              type="text"
              class="form-control form-control-lg"
              id="nameInput"
              placeholder="Contoh: Muhammad Abdul Karim"
            />
          </div>

          <button class="btn btn-primary btn-lg" onclick="calculateName()">
            Hitung
          </button>

          <hr class="my-4"/>

          <div id="result"></div>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const baseMap = {
    ha: 1,
    na: 2,
    ca: 3,
    ra: 4,
    ka: 5,
    da: 6,
    ta: 7,
    sa: 8,
    wa: 9,
    la: 10,
    pa: 11,
    dha: 12,
    ja: 13,
    ya: 14,
    nya: 15,
    ma: 16,
    ga: 17,
    ba: 18,
    tha: 19,
    nga: 20
  };

  const modulusMap = {
    1: "Sri",
    2: "Lungguh",
    3: "Lara",
    4: "Dunya",
    5: "Pati"
  };

  function normalizeText(text) {
    return text
      .toLowerCase()
      .replace(/f|v/g, 'p')
      .replace(/z/g, 'j')
      .replace(/[^a-z\s]/g, '');
  }

  function getModulusCategory(total) {
    let mod = total % 5;

    if (mod === 0) {
      mod = 5;
    }

    return {
      modulus: mod,
      category: modulusMap[mod]
    };
  }

  function tokenize(word) {
    const tokens = [];
    const chars = word.split('');

    const specialMap = ['nga', 'nya', 'dha', 'tha'];

    let i = 0;

    while (i < word.length) {

      let matched = false;

      for (const sp of specialMap) {
        if (word.substring(i, i + sp.length) === sp) {
          tokens.push(sp);
          i += sp.length;
          matched = true;
          break;
        }
      }

      if (matched) continue;

      const current = word[i];
      const next = word[i + 1];

      const vowels = ['a', 'i', 'u', 'e', 'o'];

      // vokal independen
      if (vowels.includes(current)) {
        tokens.push(current);
        i++;
        continue;
      }

      // konsonan berderet
      if (
        next &&
        !vowels.includes(current) &&
        !vowels.includes(next)
      ) {
        tokens.push(current);
        i++;
        continue;
      }

      // suku normal
      if (next && vowels.includes(next)) {
        tokens.push(current + next);
        i += 2;
        continue;
      }

      // fallback
      tokens.push(current);
      i++;
    }

    return tokens;
  }

  function getTokenValue(token) {

    const vowels = ['a', 'i', 'u', 'e', 'o'];

    // vokal independen
    if (vowels.includes(token)) {
      return 1;
    }

    // mapping khusus
    if (token.startsWith('ng')) {
      return 20;
    }

    if (token.startsWith('ny')) {
      return 15;
    }

    if (token.startsWith('dh')) {
      return 12;
    }

    if (token.startsWith('th')) {
      return 19;
    }

    const first = token[0];

    const map = {
      h: 1,
      n: 2,
      c: 3,
      r: 4,
      k: 5,
      d: 6,
      t: 7,
      s: 8,
      w: 9,
      l: 10,
      p: 11,
      j: 13,
      y: 14,
      m: 16,
      g: 17,
      b: 18
    };

    return map[first] || 0;
  }

  function calculateName() {

    const input = document.getElementById('nameInput').value;

    if (!input.trim()) {
      return;
    }

    const normalized = normalizeText(input);

    const words = normalized.split(/\s+/);

    let grandTotal = 0;

    let html = '';

    words.forEach(word => {

      const tokens = tokenize(word);

      const details = [];

      let total = 0;

      tokens.forEach(token => {
        const value = getTokenValue(token);

        details.push({
          token,
          value
        });

        total += value;
      });

      grandTotal += total;

      const modData = getModulusCategory(total);

      html += `
        <div class="result-box">
          <h4 class="mb-3 text-capitalize">${word}</h4>

          <div class="mb-2">
            ${details.map(d =>
              `<span class="token">${d.token} = ${d.value}</span>`
            ).join('')}
          </div>

          <pre>
Total : ${total}
Modulus : ${modData.modulus}
Kategori : ${modData.category}
          </pre>
        </div>
      `;
    });

    const finalMod = getModulusCategory(grandTotal);

    html += `
      <div class="alert alert-primary mt-4">
        <h3>Hasil Akhir</h3>

        <hr>

        <p><strong>Total Keseluruhan:</strong> ${grandTotal}</p>
        <p><strong>Modulus:</strong> ${finalMod.modulus}</p>
        <p><strong>Kategori:</strong> ${finalMod.category}</p>
      </div>
    `;

    document.getElementById('result').innerHTML = html;
  }
</script>

</body>
</html>
